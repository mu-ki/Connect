<div class="login-container">
    <div class="login-card glass-panel">
        <div class="logo-area">
            <div class="logo-icon">C</div>
            <h1>Connect</h1>
        </div>
        <p class="subtitle">Sign in with your Active Directory account</p>

        <form (ngSubmit)="login()" class="login-form">
            <div class="input-group">
                <label for="username">Corporate Email / UPN</label>
                <input type="text" id="username" [(ngModel)]="username" name="username"
                    placeholder="e.g. user@company.local" required autocomplete="username" />
            </div>

            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" [(ngModel)]="password" name="password" placeholder="••••••••"
                    required autocomplete="current-password" />
            </div>

            @if (error) {
            <div class="error-msg">{{ error }}</div>
            }

            <button type="submit" class="submit-btn" [disabled]="!username">
                Sign In to Connect
            </button>
        </form>
    </div>

    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
</div>
